name: Tests
on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - name: Lint
        run: uv run -m ruff check src
      - name: Format check
        run: uv run -m ruff format --check src
      - name: Tests
        run: uv run -m pytest tests --cov=src --cov-report=xml
      - name: Type check
        run: uv run ty check src
        continue-on-error: true
